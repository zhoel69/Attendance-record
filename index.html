  </style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Jadwal Kerja Harian</h1>
      <p>Pencatatan Kehadiran Shift & Backup</p>
    </div><div class="card">
  <input type="date" id="tglInput">

  <select id="shiftInput">
    <option value="Shift 1 (00:00-08:00)">Shift 1 (00:00-08:00)</option>
    <option value="Shift 2 (08:00-16:00)">Shift 2 (08:00-16:00)</option>

  <div style="display:flex; gap:10px; margin-top:8px;">

    <button class="btnTidakMasuk" id="btnTidakMasuk">Tidak Masuk</button>

  </div>

<div class="card">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th class="checkboxCol"></th>
          <th>Tanggal</th>
          <th>Shift / Jam</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
    <button id="btnModeHapus" class="btnModeHapus">Pilih & Hapus</button>
    <button id="btnBatal" class="btnBatal" style="display:none;">Batal</button>
    <button id="btnEkspor" class="btnEkspor">Ekspor CSV</button>
    <button id="btnLihatArsip" style="background:#00796b;">Lihat Arsip 15 Hari</button>

  </div>  <div class="modal" id="modalArsip">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">×</span>
      <div class="modal-header">Arsip 15 Hari</div>
      <div id="arsipContent"></div>
    </div>
  </div>  <div id="toast"></div>  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://yynjkjyzijtukyhavmqn.supabase.co',
      'sb_publishable_kj0vTSzCm4T1-uvrOrB1GQ_x05jyqxa'
    );

    const tglInput = document.getElementById('tglInput');
    const shiftInput = document.getElementById('shiftInput');
    const tableBody = document.getElementById('tableBody');

    const btnMasuk = document.getElementById('btnMasuk');
    const btnTidakMasuk = document.getElementById('btnTidakMasuk');
    const btnLibur = document.getElementById('btnLibur');

    const btnModeHapus = document.getElementById('btnModeHapus');
    const btnBatal = document.getElementById('btnBatal');
    const btnEkspor = document.getElementById('btnEkspor');
    const btnLihatArsip = document.getElementById('btnLihatArsip');

    const summaryText = document.getElementById('summaryText');

    const modalArsip = document.getElementById('modalArsip');
    const modalClose = document.getElementById('modalClose');
    const arsipContent = document.getElementById('arsipContent');

    const toast = document.getElementById('toast');

    let records = [];
    let modeHapus = false;

    function getLocalDateStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');

      return `${year}-${month}-${day}`;
    }

    function updateTanggalOtomatis() {
      const today = getLocalDateStr();

      // Selalu update max agar mengikuti tanggal perangkat saat ini
      tglInput.max = today;

      // Jika kosong atau tanggal sebelumnya sudah lewat,
      // otomatis ganti ke hari ini
      if (!tglInput.value || tglInput.value < today) {
        tglInput.value = today;
      }
    }

    function showToast(message, type = 'info') {
      const warna = {
        sukses: '#4caf50',
        error: '#f44336',
        info: '#2196f3'
      };

      toast.textContent = message;
      toast.style.background = warna[type] || '#2196f3';
      toast.style.display = 'block';

      setTimeout(() => {
        toast.style.display = 'none';
      }, 2500);
    }

    async function loadRecords() {
      const { data, error } = await supabase
        .from('attendance')
        .select('*')
        .order('tgl', { ascending: true });

      if (error) {
        showToast('Gagal memuat data', 'error');
        return;
      }

      records = data || [];
      renderTable();
    }

    function renderTable() {
      tableBody.innerHTML = '';

      let masuk = 0;
      let tidakMasuk = 0;
      let libur = 0;

      records.forEach((item, index) => {
        const tr = document.createElement('tr');

        const checkboxTd = document.createElement('td');
        checkboxTd.className = 'checkboxCol';

        if (modeHapus) {
          checkboxTd.style.display = 'table-cell';
        }

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = index;

        checkboxTd.appendChild(checkbox);
        tr.appendChild(checkboxTd);

        let kelas = 'statusLibur';

        if (item.status === 'Masuk') {
          kelas = 'statusMasuk';
          masuk++;
        } else if (item.status === 'Tidak Masuk') {
          kelas = 'statusTidak';
          tidakMasuk++;
        } else {
          libur++;
        }

        tr.innerHTML += `
          <td>${item.tgl}</td>
          <td>${item.shift}</td>
          <td class="${kelas}">${item.status}</td>
        `;

        tableBody.appendChild(tr);
      });

      summaryText.textContent =
        `Periode → Masuk: ${masuk} | Tidak Masuk: ${tidakMasuk} | Libur: ${libur}`;
    }

    async function addRecord(status) {
      updateTanggalOtomatis();

      const tgl = tglInput.value;
      const shift = shiftInput.value;

      if (!tgl) {
        showToast('Tanggal belum dipilih', 'info');
        return;
      }

      const sudahAda = records.some(
        item => item.tgl === tgl && item.shift === shift
      );

      if (sudahAda) {
        showToast('Shift pada tanggal itu sudah dicatat', 'info');
        return;
      }

      const { data, error } = await supabase
        .from('attendance')
        .insert([{ tgl, shift, status }])
        .select();

      if (error) {
        showToast('Gagal menyimpan data', 'error');
        return;
      }

      records.push(data[0]);

      records.sort((a, b) => {
        return new Date(a.tgl) - new Date(b.tgl);
      });

      renderTable();
      showToast(`${status} berhasil dicatat`, 'sukses');

      // Setelah simpan, tanggal otomatis kembali mengikuti hari ini perangkat
      updateTanggalOtomatis();
    }

    btnMasuk.addEventListener('click', () => {
      addRecord('Masuk');
    });

    btnTidakMasuk.addEventListener('click', () => {
      addRecord('Tidak Masuk');
    });

    btnLibur.addEventListener('click', () => {
      addRecord('Libur');
    });

    btnModeHapus.addEventListener('click', async () => {
      if (!modeHapus) {
        modeHapus = true;
        btnModeHapus.textContent = 'Hapus Terpilih';
        btnBatal.style.display = 'block';
        renderTable();
        return;
      }

      const checked = [
        ...document.querySelectorAll('.checkboxCol input:checked')
      ];

      if (!checked.length) {
        showToast('Pilih data yang ingin dihapus', 'info');
        return;
      }

      const indexes = checked.map(item => Number(item.value));
      const ids = indexes.map(index => records[index].id);

      const { error } = await supabase
        .from('attendance')
        .delete()
        .in('id', ids);

      if (error) {
        showToast('Gagal menghapus data', 'error');
        return;
      }

      records = records.filter((_, index) => !indexes.includes(index));

      modeHapus = false;
      btnModeHapus.textContent = 'Pilih & Hapus';
      btnBatal.style.display = 'none';

      renderTable();
      showToast('Data berhasil dihapus', 'sukses');
    });

    btnBatal.addEventListener('click', () => {
      modeHapus = false;
      btnModeHapus.textContent = 'Pilih & Hapus';
      btnBatal.style.display = 'none';
      renderTable();
    });

    btnEkspor.addEventListener('click', () => {
      if (!records.length) {
        showToast('Belum ada data untuk diekspor', 'info');
        return;
      }

      let csv = 'Tanggal,Shift / Jam,Status\n';

      records.forEach(item => {
        csv += `${item.tgl},"${item.shift}",${item.status}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');

      link.href = URL.createObjectURL(blob);
      link.download = `Jadwal_Kerja_${getLocalDateStr()}.csv`;
      link.click();

      showToast('CSV berhasil diekspor', 'sukses');
    });

// ================= PREMIUM ARSIP SYSTEM (FINAL FIX CLEAN) =================

// STYLE tambahan (inject otomatis biar nggak ribet)
const style = document.createElement('style');
style.innerHTML = `
.btnPremium {
  border:none;
  color:white;
  font-weight:600;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  transition:0.2s;
}
.btnPremium:active { transform:scale(0.95); }

.btnTampil {
  background:linear-gradient(135deg,#42a5f5,#1e88e5);
}
.btnPDF {
  background:linear-gradient(135deg,#ab47bc,#8e24aa);
}
.loadingBox {
  text-align:center;
  padding:20px;
  font-weight:600;
  color:#1976d2;
}
`;
document.head.appendChild(style);


// 🔥 FUNCTION ARSIP
async function loadArsip(bulan, tahun) {

  const isi = document.getElementById('isiLaporan');

  // loading 3 detik
  isi.innerHTML = `<div class="loadingBox">⏳ Sedang mengambil data...</div>`;
  await new Promise(r => setTimeout(r, 3000));

  const startDate = new Date(tahun, bulan, 1);
  const endDate = new Date(tahun, bulan + 1, 0);

  const { data, error } = await supabase
    .from('attendance')
    .select('*')
    .gte('tgl', startDate.toISOString().split('T')[0])
    .lte('tgl', endDate.toISOString().split('T')[0])
    .order('tgl', { ascending: true });

  if (error) {
    isi.innerHTML = 'Gagal mengambil data';
    return;
  }

  if (!data.length) {
    isi.innerHTML = 'Tidak ada data di bulan ini';
    return;
  }

  let p1 = 0, p2 = 0;

  data.forEach(item => {
    const tgl = new Date(item.tgl).getDate();
    if (item.status === 'Masuk') {
      tgl <= 15 ? p1++ : p2++;
    }
  });

  const gaji1 = p1 * 200000;
  const gaji2 = p2 * 200000;

  let html = `
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <div style="flex:1;background:#e8f5e9;padding:10px;border-radius:10px;text-align:center;">
        <div>Periode 1</div>
        <div style="font-weight:bold;">Rp ${gaji1.toLocaleString('id-ID')}</div>
        <div>${p1} hari</div>
      </div>
      <div style="flex:1;background:#e3f2fd;padding:10px;border-radius:10px;text-align:center;">
        <div>Periode 2</div>
        <div style="font-weight:bold;">Rp ${gaji2.toLocaleString('id-ID')}</div>
        <div>${p2} hari</div>
      </div>
    </div>

    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="background:#80deea;">
          <th>Tanggal</th>
          <th>Shift</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(item => {
    html += `
      <tr>
        <td>${item.tgl}</td>
        <td>${item.shift}</td>
        <td>${item.status}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  isi.innerHTML = html;

  // grafik
  const ctx = document.getElementById('chartKehadiran');

  if (window.chart) window.chart.destroy();

  window.chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Periode 1', 'Periode 2'],
      datasets: [{
        label: 'Hari Masuk',
        data: [p1, p2]
      }]
    }
  });
}


// 🔥 EVENT BUTTON ARSIP
btnLihatArsip.addEventListener('click', () => {

  modalArsip.style.display = 'flex';

  const today = new Date();

  arsipContent.innerHTML = `
    <div style="display:flex;gap:5px;margin-bottom:10px;">
      <select id="filterBulan"></select>
      <select id="filterTahun"></select>
      <button id="btnFilter" class="btnPremium btnTampil">Tampilkan</button>
      <button id="btnPDF" class="btnPremium btnPDF">PDF</button>
    </div>

    <canvas id="chartKehadiran" height="120"></canvas>
    <div id="isiLaporan"></div>
  `;

  const bulanEl = document.getElementById('filterBulan');
  const tahunEl = document.getElementById('filterTahun');

  const bulanList = [
    'Jan','Feb','Mar','Apr','Mei','Jun',
    'Jul','Agu','Sep','Okt','Nov','Des'
  ];

  bulanList.forEach((b, i) => {
    bulanEl.innerHTML += `<option value="${i}">${b}</option>`;
  });

  const tahunNow = today.getFullYear();
  for (let i = tahunNow - 2; i <= tahunNow + 2; i++) {
    tahunEl.innerHTML += `<option value="${i}">${i}</option>`;
  }

  bulanEl.value = today.getMonth();
  tahunEl.value = tahunNow;

  document.getElementById('btnFilter').onclick = () => {
    loadArsip(+bulanEl.value, +tahunEl.value);
  };

  document.getElementById('btnPDF').onclick = () => {
    html2pdf().from(document.getElementById('isiLaporan')).save();
  };

  loadArsip(today.getMonth(), tahunNow);
});

    modalClose.addEventListener('click', () => {
      modalArsip.style.display = 'none';
    });

    window.addEventListener('load', () => {
      updateTanggalOtomatis();
      loadRecords();

      const savedShift = localStorage.getItem('lastShift');

      if (savedShift) {
        shiftInput.value = savedShift;
      }
    });

    // Saat halaman dibuka lagi setelah standby / refresh / pindah tab,
    // tanggal otomatis ikut tanggal perangkat terbaru.
    window.addEventListener('focus', updateTanggalOtomatis);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        updateTanggalOtomatis();
      }
    });

    // Cek setiap 1 menit supaya kalau lewat jam 00:00 otomatis ganti tanggal.
    setInterval(updateTanggalOtomatis, 60000);

    shiftInput.addEventListener('change', () => {
  localStorage.setItem('lastShift', shiftInput.value);
});

// ================= TEST PAYROLL FINAL AUTO (FIX NGROK DINAMIS) =================

// 🔥 Ambil API dari URL (?api=)
const params = new URLSearchParams(window.location.search);
const BASE_URL = params.get('api');

async function kirimTestPayroll() {
  showToast('⏳ Mengirim slip gaji...', 'info');

  try {
    if (!BASE_URL) {
      throw new Error("API tidak ditemukan di URL");
    }

    let masuk = 0;
    let tidak = 0;
    let libur = 0;

    records.forEach(r => {
      if (r.status === 'Masuk') masuk++;
      else if (r.status === 'Tidak Masuk') tidak++;
      else libur++;
    });

    const payload = {
      nama: "Zulfahmi Afnula",
      masuk,
      tidak,
      libur,
      total: masuk * 200000,
      period: "1 - 15 April 2026"
    };

    const res = await fetch(`${BASE_URL}/test`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    if (!res.ok) throw new Error(text);

    showToast('✅ Slip gaji berhasil dikirim', 'sukses');

  } catch (err) {
    console.error(err);
    showToast('❌ ' + err.message, 'error');
  }
}

// ================= GLOBAL & EVENT =================
window.kirimTestPayroll = kirimTestPayroll;

document.getElementById('btnPayroll')
  .addEventListener('click', kirimTestPayroll);
</script>
