    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://yynjkjyzijtukyhavmqn.supabase.co',
      'sb_publishable_kj0vTSzCm4T1-uvrOrB1GQ_x05jyqxa'
    );

    const tglInput = document.getElementById('tglInput');
    const shiftInput = document.getElementById('shiftInput');
    const tableBody = document.getElementById('tableBody');

    const btnMasuk = document.getElementById('btnMasuk');
    const btnTidakMasuk = document.getElementById('btnTidakMasuk');
    const btnLibur = document.getElementById('btnLibur');

    const btnModeHapus = document.getElementById('btnModeHapus');
    const btnBatal = document.getElementById('btnBatal');
    const btnEkspor = document.getElementById('btnEkspor');
    const btnLihatArsip = document.getElementById('btnLihatArsip');

    const summaryText = document.getElementById('summaryText');

    const modalArsip = document.getElementById('modalArsip');
    const modalClose = document.getElementById('modalClose');

    const toast = document.getElementById('toast');

    let records = [];
    let modeHapus = false;

    function getLocalDateStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');

      return `${year}-${month}-${day}`;
    }

    function updateTanggalOtomatis() {
      const today = getLocalDateStr();

      // Selalu update max agar mengikuti tanggal perangkat saat ini
      tglInput.max = today;

      // Jika kosong atau tanggal sebelumnya sudah lewat,
      // otomatis ganti ke hari ini
      if (!tglInput.value || tglInput.value < today) {
        tglInput.value = today;
      }
    }

    function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');

  const warna = {
    sukses: '#4caf50',
    error: '#f44336',
    info: '#2196f3'
  };

  toast.textContent = message;
  toast.style.background = warna[type] || '#2196f3';

  // reset animasi biar bisa dipanggil berkali-kali
  toast.classList.remove('show');

  // paksa browser refresh state
  void toast.offsetWidth;

  toast.classList.add('show');

  clearTimeout(toast._timeout);

  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

    async function loadRecords() {
      const { data, error } = await supabase
        .from('attendance')
        .select('*')
        .order('tgl', { ascending: true });

      if (error) {
        showToast('Gagal memuat data', 'error');
        return;
      }

      records = data || [];
      renderTable();
    }

    function renderTable() {
      tableBody.innerHTML = '';

      let masuk = 0;
      let tidakMasuk = 0;
      let libur = 0;

      records.forEach((item, index) => {
        const tr = document.createElement('tr');

        const checkboxTd = document.createElement('td');
        checkboxTd.className = 'checkboxCol';

        if (modeHapus) {
          checkboxTd.style.display = 'table-cell';
        }

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = index;

        checkboxTd.appendChild(checkbox);
        tr.appendChild(checkboxTd);

        let kelas = 'statusLibur';

        if (item.status === 'Masuk') {
          kelas = 'statusMasuk';
          masuk++;
        } else if (item.status === 'Tidak Masuk') {
          kelas = 'statusTidak';
          tidakMasuk++;
        } else {
          libur++;
        }

        tr.innerHTML += `
          <td>${item.tgl}</td>
          <td>${item.shift}</td>
          <td class="${kelas}">${item.status}</td>
        `;

        tableBody.appendChild(tr);
      });

      summaryText.textContent =
        `Periode → Masuk: ${masuk} | Tidak Masuk: ${tidakMasuk} | Libur: ${libur}`;
    }

    async function addRecord(status) {
      updateTanggalOtomatis();

      const tgl = tglInput.value;
      const shift = shiftInput.value;

      if (!tgl) {
        showToast('Tanggal belum dipilih', 'info');
        return;
      }

      const sudahAda = records.some(
        item => item.tgl === tgl && item.shift === shift
      );

      if (sudahAda) {
        showToast('Shift pada tanggal itu sudah dicatat', 'info');
        return;
      }

      const { data, error } = await supabase
        .from('attendance')
        .insert([{ tgl, shift, status }])
        .select();

      if (error) {
        showToast('Gagal menyimpan data', 'error');
        return;
      }

      records.push(data[0]);

      records.sort((a, b) => {
        return new Date(a.tgl) - new Date(b.tgl);
      });

      renderTable();
      showToast(`${status} berhasil dicatat`, 'sukses');

      // Setelah simpan, tanggal otomatis kembali mengikuti hari ini perangkat
      updateTanggalOtomatis();
    }

    btnMasuk.addEventListener('click', () => {
      addRecord('Masuk');
    });

    btnTidakMasuk.addEventListener('click', () => {
      addRecord('Tidak Masuk');
    });

    btnLibur.addEventListener('click', () => {
      addRecord('Libur');
    });

    btnModeHapus.addEventListener('click', async () => {
      if (!modeHapus) {
        modeHapus = true;
        btnModeHapus.textContent = 'Hapus Terpilih';
        btnBatal.style.display = 'block';
        renderTable();
        return;
      }

      const checked = [
        ...document.querySelectorAll('.checkboxCol input:checked')
      ];

      if (!checked.length) {
        showToast('Pilih data yang ingin dihapus', 'info');
        return;
      }

      const indexes = checked.map(item => Number(item.value));
      const ids = indexes.map(index => records[index].id);

      const { error } = await supabase
        .from('attendance')
        .delete()
        .in('id', ids);

      if (error) {
        showToast('Gagal menghapus data', 'error');
        return;
      }

      records = records.filter((_, index) => !indexes.includes(index));

      modeHapus = false;
      btnModeHapus.textContent = 'Pilih & Hapus';
      btnBatal.style.display = 'none';

      renderTable();
      showToast('Data berhasil dihapus', 'sukses');
    });

    btnBatal.addEventListener('click', () => {
      modeHapus = false;
      btnModeHapus.textContent = 'Pilih & Hapus';
      btnBatal.style.display = 'none';
      renderTable();
    });

    btnEkspor.addEventListener('click', () => {
      if (!records.length) {
        showToast('Belum ada data untuk diekspor', 'info');
        return;
      }

      let csv = 'Tanggal,Shift / Jam,Status\n';

      records.forEach(item => {
        csv += `${item.tgl},"${item.shift}",${item.status}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');

      link.href = URL.createObjectURL(blob);
      link.download = `Jadwal_Kerja_${getLocalDateStr()}.csv`;
      link.click();

      showToast('CSV berhasil diekspor', 'sukses');
    });

window.generatePDF = async function (bulan, tahun, periode = 1) {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  // =====================
  // RANGE PERIODE
  // =====================
  const pad = (n) => String(n).padStart(2, '0');

const startDay = periode === 1 ? 1 : 16;
const endDay = periode === 1
  ? 15
  : new Date(tahun, bulan + 1, 0).getDate();

const start = `${tahun}-${pad(bulan + 1)}-${pad(startDay)}`;
const end = `${tahun}-${pad(bulan + 1)}-${pad(endDay)}`;

  const { data } = await supabase
    .from('attendance')
    .select('*')
    .gte('tgl', start)
.lte('tgl', end)
    .order('tgl', { ascending: true });

  const safeData = data || [];

  let masuk = 0, tidak = 0, libur = 0;

  const tableData = safeData.map(d => {
    if (d.status === "Masuk") masuk++;
    else if (d.status === "Tidak Masuk") tidak++;
    else libur++;

    return [d.tgl, d.shift, d.status];
  });

  const gaji = masuk * 200000;

  // =====================
  // HEADER
  // =====================
  doc.setFontSize(14);
  doc.text("USAHA GUNA BHAKTI MANDIRI", 105, 15, { align: "center" });

  doc.setFontSize(11);
  doc.text("SYSTEM Payroll Digital Statement", 105, 21, { align: "center" });

  // =====================
  // IDENTITAS
  // =====================
  doc.setFontSize(10);
  doc.text("Nama: Zulfahmi Afnula", 14, 35);
  doc.text("OPS ID: 8912", 14, 41);
  doc.text("Jabatan: NCR (Non Conformance Report)", 14, 47);

  doc.text(`Periode: ${periode === 1 ? "1 - 15" : "16 - akhir"}`, 14, 55);

  // =====================
  // TABEL
  // =====================
  doc.autoTable({
    head: [['Tanggal', 'Shift', 'Status']],
    body: tableData,
    startY: 65,
    styles: {
      fontSize: 9,
      cellPadding: 2
    },
    headStyles: {
      fillColor: [30, 136, 229]
    }
  });

  // =====================
  // GAJI
  // =====================
  let y = doc.lastAutoTable.finalY + 10;

  doc.text(`Total Masuk : ${masuk} Hari`, 14, y);
  doc.text(`Gaji / Hari : Rp 200.000`, 14, y + 6);
  doc.text(`TOTAL GAJI  : Rp ${gaji.toLocaleString('id-ID')}`, 14, y + 12);

  // =====================
  // MOTIVASI (FIX 5 LIST ROTASI)
  // =====================
  const motivasi = [
  "Kerja keras hari ini adalah masa depanmu.",
  "Rezeki tidak pernah salah alamat.",
  "Allah tahu kamu sedang berjuang.",
  "Jangan berhenti sebelum sampai tujuan.",
  "Istiqomah lebih kuat dari motivasi sesaat."
];

// ambil index dari localStorage
let motivasiIndex = Number(localStorage.getItem('motivasiIndex') || 0);

// ambil pesan
const msg = motivasi[motivasiIndex];

// geser index
motivasiIndex = (motivasiIndex + 1) % motivasi.length;

// simpan lagi
localStorage.setItem('motivasiIndex', motivasiIndex);

  doc.setFontSize(10);
  doc.text(`"${msg}"`, 105, y + 25, { align: "center" });

  // =====================
  // FOOTER
  // =====================
  doc.setFontSize(9);
  doc.text("Generated by Supabase Payroll System", 105, 280, { align: "center" });

  doc.save(`Payroll_${tahun}_${bulan + 1}_P${periode}.pdf`);
};

// ================= LOAD ARSIP =================
async function loadArsip(bulan, tahun) {

  const isi = document.getElementById('isiLaporan');

  isi.innerHTML = `<div class="loadingBox">⏳ Mengambil data...</div>`;
  await new Promise(r => setTimeout(r, 400));

  const startDate = new Date(tahun, bulan, 1);
  const endDate = new Date(tahun, bulan + 1, 0);

  const { data, error } = await supabase
    .from('attendance')
    .select('*')
    .gte('tgl', startDate.toISOString().split('T')[0])
    .lte('tgl', endDate.toISOString().split('T')[0])
    .order('tgl', { ascending: true });

  if (error) {
    isi.innerHTML = '❌ Gagal mengambil data';
    return;
  }

  // ================= PER 15 HARI =================
  const periode1 = data.filter(d => new Date(d.tgl).getDate() <= 15);
  const periode2 = data.filter(d => new Date(d.tgl).getDate() > 15);

  let masuk1 = 0, tidak1 = 0, libur1 = 0;
  let masuk2 = 0, tidak2 = 0, libur2 = 0;

  periode1.forEach(i => {
    if (i.status === 'Masuk') masuk1++;
    else if (i.status === 'Tidak Masuk') tidak1++;
    else libur1++;
  });

  periode2.forEach(i => {
    if (i.status === 'Masuk') masuk2++;
    else if (i.status === 'Tidak Masuk') tidak2++;
    else libur2++;
  });

  const gaji1 = masuk1 * 200000;
  const gaji2 = masuk2 * 200000;

  function renderTable(title, arr) {
    if (!arr.length) {
      return `<p style="text-align:center;color:#999;">Tidak ada data</p>`;
    }

    return `
      <h3 style="margin:10px 0 5px 0;font-size:13px;">${title}</h3>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr style="background:#80deea;">
            <th>Tanggal</th>
            <th>Shift</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${arr.map(item => `
            <tr>
              <td>${item.tgl}</td>
              <td>${item.shift}</td>
              <td>${item.status}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;

// 🔥 Ambil API dari URL (?api=)
const params = new URLSearchParams(window.location.search);
const BASE_URL = params.get('api');

async function kirimTestPayroll() {
  showToast('⏳ Mengirim slip gaji...', 'info');

  try {
    if (!BASE_URL) {
      throw new Error("API tidak ditemukan di URL");
    }

    let masuk = 0;
    let tidak = 0;
    let libur = 0;

    records.forEach(r => {
      if (r.status === 'Masuk') masuk++;
      else if (r.status === 'Tidak Masuk') tidak++;
      else libur++;
    });

    const payload = {
      nama: "Zulfahmi Afnula",
      masuk,
      tidak,
      libur,
      total: masuk * 200000,
      period: "1 - 15 April 2026"
    };

    const res = await fetch(`${BASE_URL}/test`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    if (!res.ok) throw new Error(text);

    showToast('✅ Slip gaji berhasil dikirim', 'sukses');

  } catch (err) {
    console.error(err);
    showToast('❌ ' + err.message, 'error');
  }
}

// ================= GLOBAL & EVENT =================
window.kirimTestPayroll = kirimTestPayroll;

document.getElementById('btnPayroll')
  .addEventListener('click', kirimTestPayroll);
